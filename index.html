<html>
<head>
    <title>BIST30</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f7e5ec;
            color: #d28a8c;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        canvas {
            width: 100%;
            background: #c5c7ca;
            border-radius: 10px;
        }

        button {
            padding: 8px 12px;
            margin-bottom: 10px;
            cursor: pointer;

            background-color: #d28a8c;  /* buton rengi */
            color: white;              /* yazı rengi */
            border: none;
            border-radius: 9px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #c5c7ca;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #c5c7ca;
        }

        tr:hover {
            background: #b0b3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- GERİ BUTONU -->
    <br><button onclick="tumunuGoster()"> < </button>

    <canvas id="chart" height="120"></canvas>

    <table>
        <thead>
            <tr>
                <th>HISSE</th>
                <th>RSI</th>
                <th>EMA200</th>
                <th>FIYAT</th>
            </tr>
        </thead>
        <tbody id="tablo"></tbody>
    </table>

</div>

<script>

let chart;
let seciliHisse = ""; // seçilen hisse

function veriYukle() {

    fetch("http://127.0.0.1:5000/signals")
    .then(res => res.json())
    .then(data => {

        let filtreli = data;

        // eğer hisse seçildiyse filtrele
        if(seciliHisse !== ""){
            filtreli = data.filter(x => x.symbol === seciliHisse);
        }

        // grafik verisi
        const labels = filtreli.map(x => x.symbol);
        const rsi = filtreli.map(x => x.rsi);
        const ema = filtreli.map(x => x.ema200);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [
                    {
                        label: "RSI",
                        data: rsi,
                        borderColor: "green",
                        tension: 0.3
                    },
                    {
                        label: "EMA200",
                        data: ema,
                        borderColor: "red",
                        tension: 0.3
                    }
                ]
            }
        });

        // TABLO
        const tablo = document.getElementById("tablo");
        tablo.innerHTML = "";

        filtreli.forEach(x => {
            let satir = `
                <tr onclick="hisseSec('${x.symbol}')" style="cursor:pointer">
                    <td>${x.symbol}</td>
                    <td>${x.rsi.toFixed(2)}</td>
                    <td>${x.ema200.toFixed(2)}</td>
                    <td>${x.close.toFixed(2)}</td>
                </tr>
            `;
            tablo.innerHTML += satir;
        });

    });
}

// tabloya tıklayınca
function hisseSec(symbol){
    seciliHisse = symbol;
    veriYukle();
}

// geri butonu
function tumunuGoster(){
    seciliHisse = "";
    veriYukle();
}

// ilk yükleme
veriYukle();

// 10 saniyede yenile
setInterval(veriYukle, 10000);

</script>

</body>
</html>
