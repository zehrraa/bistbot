<html>
<head>
    <meta charset="UTF-8">
    <title>BIST30</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #819ab1;
            color: #677889;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        canvas {
            width: 100%;
            background: #c5c7ca;
            border-radius: 10px;
        }

        button {
            padding: 8px 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background-color: #677889;
            color: white;
            border: none;
            border-radius: 9px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #c5c7ca;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #c5c7ca;
        }

        tr:hover {
            background: #b0b3b8;
        }
   
   input {
    padding: 8px 12px;
    margin-bottom: 10px;
    border: 1px solid #677889;
    border-radius: 9px;
    outline: none;
}

.rsi-yuksek {
    color: red;
    font-weight: bold;
}

.rsi-dusuk {
    color: green;
    font-weight: bold;
}

.rsi-normal {
    color: #333;
}

th {
    cursor: pointer;
}

th:hover {
    background: #b0b3b8;
}
   .dark-mode {
    background: #1e1e1e;
    color: white;
}

.dark-mode canvas {
    background: #2b2b2b;
}

.dark-mode th {
    background: #333;
}

.dark-mode tr:nth-child(even) {
    background: #2b2b2b;
}

.dark-mode tr:hover {
    background: #444;
}
    </style>
</head>

<body>

<div class="container">

    <br>
    
    <button onclick="tumunuGoster()"> &lt; Tümünü Göster</button>
    <button onclick="favorileriGoster()">⭐ Favoriler</button>
    <button onclick="temaDegistir()">Tema</button>

    <input 
    type="text" 
    id="aramaKutusu" 
    placeholder="Hisse ara.."
    onkeyup="veriYukle()"
>

<button onclick="filtreSec('tum')">Tümü</button>
<button onclick="filtreSec('rsiYuksek')">RSI Yüksek</button>
<button onclick="filtreSec('rsiDusuk')">RSI Düşük</button>
<button onclick="filtreSec('emaUstu')">EMA Üstü</button>


    <canvas id="chart" height="120"></canvas>

    <p id="sonVeriBilgisi" style="text-align:center; font-weight:bold;"></p>

    <table>
        <thead>
            <tr>
                <th>Favorile</th>
               <th onclick="sirala('symbol')">HISSE</th>
               <th onclick="sirala('rsi')">RSI</th>
               <th onclick="sirala('ema200')">EMA200</th>
               <th onclick="sirala('close')">FIYAT</th>
            </tr>
        </thead>
        <tbody id="tablo"></tbody>
    </table>

</div>

<script>

let chart;
let seciliHisse = "";
let favoriler = JSON.parse(localStorage.getItem("favoriler")) || [];
let sadeceFavoriler = false;
let aktifFiltre = "tum";
let siralamaKolonu = "";
let siralamaYon = "asc";

// tarih stringini Date objesine çevir
function saatFormatla(tarihStr) {
    const yazi = String(tarihStr);

    const eslesme = yazi.match(/(\d{2}):(\d{2}):(\d{2})/);

    if (eslesme) {
        return eslesme[1] + ":" + eslesme[2];
    }

    const tarih = new Date(tarihStr);
    const saat = String(tarih.getHours()).padStart(2, "0");
    const dakika = String(tarih.getMinutes()).padStart(2, "0");

    return saat + ":" + dakika;
}

// bugün mü kontrolü
function bugunMu(tarihStr) {
    const tarih = tarihCevir(tarihStr);
    const simdi = new Date();

    return (
        tarih.getFullYear() === simdi.getFullYear() &&
        tarih.getMonth() === simdi.getMonth() &&
        tarih.getDate() === simdi.getDate()
    );
}

// 09:00 - 18:00 arasında mı
function saatAraliktaMi(tarihStr) {
    const tarih = tarihCevir(tarihStr);
    const saat = tarih.getHours();
    return saat >= 9 && saat <= 18;
}

function veriYukle() {

    let url = "";

    if (seciliHisse === "") {
        url = "http://3.79.16.80:5000/signals/latest";
    } else {
        url = "http://3.79.16.80:5000/signals/hourly/" + seciliHisse;
    }

    fetch(url)
    .then(res => res.json())
    .then(data => {

        if (data.length > 0) {
            let sonZaman = data[0].time;

            data.forEach(x => {
                if (new Date(x.time) > new Date(sonZaman)) {
                    sonZaman = x.time;
                }
            });

            document.getElementById("sonVeriBilgisi").innerText =
                "Son çekilen veri saati: " + saatFormatla(sonZaman);
        }

        let filtreli = data;
        let tekilVeriler = [];

        if (seciliHisse === "") {
            // Hepsi görünümünde aynı hisseleri teke düşür
            let eklenenHisseler = new Set();

            data.forEach(x => {
                if (!eklenenHisseler.has(x.symbol)) {
                    tekilVeriler.push(x);
                    eklenenHisseler.add(x.symbol);
                }
            });

            filtreli = tekilVeriler;
            if (sadeceFavoriler) {
    filtreli = filtreli.filter(x => favoriler.includes(x.symbol));
}

            // Arama kutusu filtresi
const aramaDegeri = document.getElementById("aramaKutusu").value.toUpperCase();

if (aramaDegeri !== "") {
    filtreli = filtreli.filter(x => x.symbol.toUpperCase().includes(aramaDegeri));
}

// Buton filtreleri
if (aktifFiltre === "rsiYuksek") {
    filtreli = filtreli.filter(x => Number(x.rsi) >= 70);
}

if (aktifFiltre === "rsiDusuk") {
    filtreli = filtreli.filter(x => Number(x.rsi) <= 30);
}

if (aktifFiltre === "emaUstu") {
    filtreli = filtreli.filter(x => Number(x.close) > Number(x.ema200));
}

// Sıralama
if (siralamaKolonu !== "") {
    filtreli.sort((a, b) => {
        let degerA = a[siralamaKolonu];
        let degerB = b[siralamaKolonu];

        if (siralamaKolonu !== "symbol") {
            degerA = Number(degerA);
            degerB = Number(degerB);
        }

        if (siralamaYon === "asc") {
            return degerA > degerB ? 1 : -1;
        } else {
            return degerA < degerB ? 1 : -1;
        }
    });
}

        } else {
            // Tek hisse görünümünde sadece seçilen hisse
            filtreli = data.filter(x => x.symbol === seciliHisse);

            // eski saatten yeni saate sırala
            filtreli.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        let labels = [];
        let rsi = [];
        let ema = [];
        let fiyat = [];

        if (seciliHisse === "") {
            // hepsi görünümünde tekil hisse isimleri
            labels = filtreli.map(x => x.symbol);
            rsi = filtreli.map(x => x.rsi);
            ema = filtreli.map(x => x.ema200);

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "RSI",
                            data: rsi,
                            borderColor: "green",
                            tension: 0.3,
                            pointRadius: 4
                        },
                        {
                            label: "EMA200",
                            data: ema,
                            borderColor: "red",
                            tension: 0.3,
                            pointRadius: 4
                        }
                    ]
                }
            });

        } else {
            // tek hisse görünümünde saatler
            labels = filtreli.map(x => saatFormatla(x.time));
            rsi = filtreli.map(x => Number(x.rsi));
            ema = filtreli.map(x => Number(x.ema200));
            fiyat = filtreli.map(x => Number(x.close));

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "RSI",
                            data: rsi,
                            borderColor: "green",
                            tension: 0.3,
                            pointRadius: 4,
                            yAxisID: "y"
                        },
                        {
                            label: "EMA200",
                            data: ema,
                            borderColor: "red",
                            tension: 0.3,
                            pointRadius: 4,
                            yAxisID: "y1"
                        },
                        {
                            label: "FIYAT",
                            data: fiyat,
                            borderColor: "blue",
                            tension: 0.3,
                            pointRadius: 4,
                            yAxisID: "y1"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            type: "linear",
                            position: "left",
                            min: 0,
                            max: 100,
                            title: {
                                display: true,
                                text: "RSI"
                            }
                        },
                        y1: {
                            type: "linear",
                            position: "right",
                            grid: {
                                drawOnChartArea: false
                            },
                            title: {
                                display: true,
                                text: "EMA200 / FIYAT"
                            }
                        }
                    }
                }
            });
        }

        // TABLO
        const tablo = document.getElementById("tablo");
        tablo.innerHTML = "";

        if (seciliHisse === "") {
            // Hepsi görünümünde her hisseden 1 tane göster
            filtreli.forEach(x => {
                let rsiClass = "rsi-normal";

                if (Number(x.rsi) >= 70) {
                rsiClass = "rsi-yuksek";
                } else if (Number(x.rsi) <= 30) {
                rsiClass = "rsi-dusuk";
        }

let yildiz = favoriler.includes(x.symbol) ? "⭐" : "☆";

let satir = `
    <tr>
        <td>
            <button onclick="favoriDegistir('${x.symbol}')">${yildiz}</button>
        </td>
        <td onclick="hisseSec('${x.symbol}')" style="cursor:pointer">${x.symbol}</td>
        <td class="${rsiClass}">${Number(x.rsi).toFixed(2)}</td>
        <td>${Number(x.ema200).toFixed(2)}</td>
        <td>${Number(x.close).toFixed(2)}</td>
    </tr>
`;

tablo.innerHTML += satir;
            });
        } else {
            // Tek hisse görünümünde sadece en güncel 1 kayıt göster
            if (filtreli.length > 0) {
                const sonKayit = filtreli[filtreli.length - 1];

                let yildiz = favoriler.includes(sonKayit.symbol) ? "⭐" : "☆";
                
                let satir = `
    <tr>
        <td>
            <button onclick="favoriDegistir('${sonKayit.symbol}')">${yildiz}</button>
            </td>
        <td>${sonKayit.symbol}</td>
        <td>${Number(sonKayit.rsi).toFixed(2)}</td>
        <td>${Number(sonKayit.ema200).toFixed(2)}</td>
        <td>${Number(sonKayit.close).toFixed(2)}</td>
    </tr>
`;

                tablo.innerHTML = satir;
            }
        }

    })
    .catch(err => {
        console.log("Hata:", err);
    });
}

function hisseSec(symbol) {
    seciliHisse = symbol;
    veriYukle();
}

function tumunuGoster() {
    seciliHisse = "";
    sadeceFavoriler = false;
    veriYukle();
}
function filtreSec(filtre) {
    aktifFiltre = filtre;
    veriYukle();
}

function sirala(kolon) {
    if (siralamaKolonu === kolon) {
        siralamaYon = siralamaYon === "asc" ? "desc" : "asc";
    } else {
        siralamaKolonu = kolon;
        siralamaYon = "asc";
    }

    veriYukle();
}
function favoriDegistir(symbol) {
    if (favoriler.includes(symbol)) {
        favoriler = favoriler.filter(x => x !== symbol);
    } else {
        favoriler.push(symbol);
    }

    localStorage.setItem("favoriler", JSON.stringify(favoriler));
    veriYukle();
}
    function favorileriGoster() {
    sadeceFavoriler = true;
    seciliHisse = "";
    veriYukle();
}
function temaDegistir() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("tema", "dark");
    } else {
        localStorage.setItem("tema", "light");
    }
}
veriYukle();

setInterval(veriYukle, 10000);

</script>

</body>
</html>
