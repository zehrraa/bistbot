<html>
<head>
    <title>BIST30</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f7e5ec;
            color: #d28a8c;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        canvas {
            width: 100%;
            background: #c5c7ca;
            border-radius: 10px;
        }

        button {
            padding: 8px 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background-color: #d28a8c;
            color: white;
            border: none;
            border-radius: 9px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #c5c7ca;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #c5c7ca;
        }

        tr:hover {
            background: #b0b3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <br><button onclick="tumunuGoster()"> < </button>

    <canvas id="chart" height="120"></canvas>

    <table>
        <thead>
            <tr>
                <th>HISSE</th>
                <th>RSI</th>
                <th>EMA200</th>
                <th>FIYAT</th>
            </tr>
        </thead>
        <tbody id="tablo"></tbody>
    </table>

</div>

<script>

let chart;
let seciliHisse = "";

// tarih stringini Date objesine çevir
function tarihCevir(tarihStr) {
    return new Date(tarihStr);
}

// sadece saat:dakika göster
function saatFormatla(tarihStr) {
    const tarih = tarihCevir(tarihStr);
    const saat = String(tarih.getHours()).padStart(2, "0");
    const dakika = String(tarih.getMinutes()).padStart(2, "0");
    return saat + ":" + dakika;
}

// bugün mü kontrolü
function bugunMu(tarihStr) {
    const tarih = tarihCevir(tarihStr);
    const simdi = new Date();

    return (
        tarih.getFullYear() === simdi.getFullYear() &&
        tarih.getMonth() === simdi.getMonth() &&
        tarih.getDate() === simdi.getDate()
    );
}

// 09:00 - 18:00 arasında mı
function saatAraliktaMi(tarihStr) {
    const tarih = tarihCevir(tarihStr);
    const saat = tarih.getHours();
    return saat >= 9 && saat <= 18;
}

function veriYukle() {

    fetch("http://3.79.16.80:5000/signals")
    .then(res => res.json())
    .then(data => {

        let filtreli = data;
        let tekilVeriler = [];

        if (seciliHisse === "") {
            // Hepsi görünümünde aynı hisseleri teke düşür
            let eklenenHisseler = new Set();

            data.forEach(x => {
                if (!eklenenHisseler.has(x.symbol)) {
                    tekilVeriler.push(x);
                    eklenenHisseler.add(x.symbol);
                }
            });

            filtreli = tekilVeriler;
        } else {
            // Tek hisse görünümünde sadece seçilen hisse
            filtreli = data.filter(x => x.symbol === seciliHisse);

            // sadece bugünün kayıtları
            filtreli = filtreli.filter(x => bugunMu(x.time));

            // sadece 09:00 - 18:00 arası
            filtreli = filtreli.filter(x => saatAraliktaMi(x.time));

            // eski saatten yeni saate sırala
            filtreli.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        let labels = [];
        let rsi = [];
        let ema = [];
        let fiyat = [];

        if (seciliHisse === "") {
            // hepsi görünümünde tekil hisse isimleri
            labels = filtreli.map(x => x.symbol);
            rsi = filtreli.map(x => x.rsi);
            ema = filtreli.map(x => x.ema200);

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "RSI",
                            data: rsi,
                            borderColor: "green",
                            tension: 0.3,
                            pointRadius: 0
                        },
                        {
                            label: "EMA200",
                            data: ema,
                            borderColor: "red",
                            tension: 0.3,
                            pointRadius: 0
                        }
                    ]
                }
            });

        } else {
            // tek hisse görünümünde saatler
            labels = filtreli.map(x => saatFormatla(x.time));
            rsi = filtreli.map(x => Number(x.rsi));
            ema = filtreli.map(x => Number(x.ema200));
            fiyat = filtreli.map(x => Number(x.close));

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "RSI",
                            data: rsi,
                            borderColor: "green",
                            tension: 0.3,
                            pointRadius: 0,
                            yAxisID: "y"
                        },
                        {
                            label: "EMA200",
                            data: ema,
                            borderColor: "red",
                            tension: 0.3,
                            pointRadius: 0,
                            yAxisID: "y1"
                        },
                        {
                            label: "FIYAT",
                            data: fiyat,
                            borderColor: "blue",
                            tension: 0.3,
                            pointRadius: 0,
                            yAxisID: "y1"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            type: "linear",
                            position: "left",
                            min: 0,
                            max: 100,
                            title: {
                                display: true,
                                text: "RSI"
                            }
                        },
                        y1: {
                            type: "linear",
                            position: "right",
                            grid: {
                                drawOnChartArea: false
                            },
                            title: {
                                display: true,
                                text: "EMA200 / FIYAT"
                            }
                        }
                    }
                }
            });
        }

        // TABLO
        const tablo = document.getElementById("tablo");
        tablo.innerHTML = "";

        if (seciliHisse === "") {
            // Hepsi görünümünde her hisseden 1 tane göster
            filtreli.forEach(x => {
                let satir = `
                    <tr onclick="hisseSec('${x.symbol}')" style="cursor:pointer">
                        <td>${x.symbol}</td>
                        <td>${Number(x.rsi).toFixed(2)}</td>
                        <td>${Number(x.ema200).toFixed(2)}</td>
                        <td>${Number(x.close).toFixed(2)}</td>
                    </tr>
                `;
                tablo.innerHTML += satir;
            });
        } else {
            // Tek hisse görünümünde sadece en güncel 1 kayıt göster
            if (filtreli.length > 0) {
                const sonKayit = filtreli[filtreli.length - 1];

                let satir = `
                    <tr>
                        <td>${sonKayit.symbol}</td>
                        <td>${Number(sonKayit.rsi).toFixed(2)}</td>
                        <td>${Number(sonKayit.ema200).toFixed(2)}</td>
                        <td>${Number(sonKayit.close).toFixed(2)}</td>
                    </tr>
                `;
                tablo.innerHTML = satir;
            }
        }

    })
    .catch(err => {
        console.log("Hata:", err);
    });
}

function hisseSec(symbol) {
    seciliHisse = symbol;
    veriYukle();
}

function tumunuGoster() {
    seciliHisse = "";
    veriYukle();
}

veriYukle();

setInterval(veriYukle, 10000);

</script>

</body>
</html>
